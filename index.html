<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#0f1c1a" />
    <title>Trip One — a grounded AI trip planner</title>
    <meta
      name="description"
      content="Describe a trip in one sentence and Trip One builds a real, day-by-day itinerary from verified places — then refine it by chatting. Free, and no account needed to start."
    />
    <link rel="canonical" href="https://trip-one.pages.dev/" />
    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Trip One" />
    <meta property="og:title" content="Trip One — a grounded AI trip planner" />
    <meta
      property="og:description"
      content="Describe a trip in one sentence and Trip One builds a real, day-by-day itinerary from verified places — then refine it by chatting."
    />
    <meta property="og:url" content="https://trip-one.pages.dev/" />
    <meta property="og:image" content="https://trip-one.pages.dev/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Trip One — a grounded AI trip planner" />
    <meta
      name="twitter:description"
      content="Describe a trip in one sentence and Trip One builds a real, day-by-day itinerary from verified places — then refine it by chatting."
    />
    <meta name="twitter:image" content="https://trip-one.pages.dev/og.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Apply the saved light/dark choice before first paint so there's no
         flash of the wrong theme. Mirrors src/lib/theme.ts.
         NOTE: this inline script is allowlisted in public/_headers via a CSP
         sha256 hash. If you edit the script below, regenerate that hash. -->
    <script>
      try {
        var t = localStorage.getItem('trip-one-theme')
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t)
      } catch (e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
